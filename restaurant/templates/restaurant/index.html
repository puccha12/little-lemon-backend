<!DOCTYPE html>
<html>
<head>
    <title>Little Lemon Restaurant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
        }
        header {
            background-color: #495E57;
            color: white;
            padding: 20px;
            text-align: center;
        }
        h1 { color: #F4CE14; }
        .content {
            padding: 20px;
            text-align: center;
        }
        .btn {
            background-color: #F4CE14;
            color: #333;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            margin: 10px;
            cursor: pointer;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <header>
        <h1>Little Lemon Restaurant</h1>
        <p>Welcome to Little Lemon - Your favourite Mediterranean restaurant!</p>
    </header>
    <div class="content">
        <h2>Our API Endpoints</h2>
        <p>Use the links below to explore our API</p>
        <a href="/restaurant/menu/" class="btn">View Menu</a>
        <a href="/restaurant/booking/tables/" class="btn">View Bookings</a>
    </div>
</body>
</html>
